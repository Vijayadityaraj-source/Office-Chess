<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#769656" />
  <title>Log Game · Office Chess</title>
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main>
    <!-- Setup form -->
    <section class="section" id="setup-section">
      <div class="section-title"><span>New Game</span></div>
      <div class="card card-pad">
        <label class="field" id="upcoming-field">
          <span class="lbl">Start a scheduled game</span>
          <select id="upcoming-select">
            <option value="">New game (enter details below)</option>
          </select>
        </label>
        <div class="grid-2">
          <label class="field">
            <span class="lbl">White</span>
            <select id="white-select"></select>
          </label>
          <label class="field">
            <span class="lbl">Black</span>
            <select id="black-select"></select>
          </label>
        </div>
        <div style="text-align:right;margin:-0.35rem 0 0.85rem">
          <button class="icon-btn" type="button" id="add-player-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Add player
          </button>
        </div>
        <label class="field">
          <span class="lbl">Game name</span>
          <input id="game-name" type="text" placeholder="e.g. Semi Final - Match 1" />
        </label>
        <label class="field">
          <span class="lbl">Time control</span>
          <input id="time-control" type="text" value="10+0" placeholder="10+0" />
        </label>
        <button class="btn btn-primary btn-block" id="start-btn">Start Game</button>
      </div>
    </section>

    <!-- Active game -->
    <section class="section hidden" id="game-section">
      <div class="section-title">
        <span id="active-name"></span>
        <span class="live-badge" id="active-live">Live</span>
      </div>

      <div class="player-bar" id="top-player"></div>
      <div class="card-pad" style="padding:0">
        <div id="board"></div>
        <!-- Promotion picker overlay is injected here by log.js -->
      </div>
      <div class="player-bar" id="bottom-player"></div>

      <div class="status-line" id="turn-line"></div>

      <div class="card mt-1">
        <div class="moves" id="movelist"></div>
        <div class="card-pad" style="border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
          <span class="status-line" id="save-status" style="padding:0"></span>
          <button class="btn" id="undo-btn">&#8630; Undo move</button>
        </div>
      </div>

      <div class="section mt-1">
        <div class="section-title"><span>End Game</span></div>
        <div class="card card-pad">
          <div id="end-banner" class="hidden result-banner"></div>
          <div class="btn-row mb-1">
            <button class="btn btn-danger" data-end="resign-white">White Resigns</button>
            <button class="btn btn-danger" data-end="resign-black">Black Resigns</button>
          </div>
          <div class="btn-row mb-1">
            <button class="btn" data-end="draw">Draw</button>
            <button class="btn" data-end="timeout-white">White Timeout</button>
            <button class="btn" data-end="timeout-black">Black Timeout</button>
          </div>
          <button class="btn btn-primary btn-block" id="finish-btn" disabled>
            Finish &amp; Save Game
          </button>
        </div>
      </div>

      <!-- Discard / delete the in-progress game -->
      <div class="section mt-1">
        <div class="card card-pad">
          <button class="btn btn-danger btn-block" id="delete-btn">
            Delete this game
          </button>
          <div id="delete-confirm" class="hidden mt-1">
            <div class="status-line" style="padding:0 0 .5rem">
              Delete this game permanently? This cannot be undone.
            </div>
            <div class="btn-row">
              <button class="btn btn-danger" id="delete-yes"
                style="flex:1">Yes, delete</button>
              <button class="btn" id="delete-no" style="flex:1">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Add-player modal -->
  <div class="modal-overlay hidden" id="player-modal">
    <div class="modal card">
      <div class="modal-head">
        <span>Add Player</span>
        <button class="icon-btn" id="player-close" aria-label="Close">&times;</button>
      </div>
      <div class="card-pad">
        <label class="field">
          <span class="lbl">Name</span>
          <input id="player-name" type="text" placeholder="Full name" autocomplete="off" />
        </label>
        <label class="field">
          <span class="lbl">Employee ID</span>
          <input id="player-dept" type="text" placeholder="e.g. e430289" autocomplete="off" />
        </label>
        <button class="btn btn-primary btn-block" id="player-save">Add Player</button>
      </div>
    </div>
  </div>

  <script src="/public/js/vendor/chess.min.js"></script>
  <script src="/public/js/board.js"></script>
  <script src="/public/js/util.js"></script>
  <script src="/public/js/log.js"></script>
</body>
</html>
